Organizations:
  - &OrdererOrg
    Name: OrdererMSP
    ID: OrdererMSP
    MSPDir: crypto-config/ordererOrganizations/example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"
      BlockValidation:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
    OrdererEndpoints:
      - orderer.example.com:7050

  - &HospitalMSP
    Name: HospitalMSP
    ID: HospitalMSP
    MSPDir: crypto-config/peerOrganizations/hospital.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('HospitalMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('HospitalMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('HospitalMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('HospitalMSP.member')"
    AnchorPeers:
      - Host: peer0.hospital.com
        Port: 7051

  - &DoctorMSP
    Name: DoctorMSP
    ID: DoctorMSP
    MSPDir: crypto-config/peerOrganizations/doctor.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('DoctorMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('DoctorMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('DoctorMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('DoctorMSP.member')"
    AnchorPeers:
      - Host: peer0.doctor.com
        Port: 7051

  - &PatientMSP
    Name: PatientMSP
    ID: PatientMSP
    MSPDir: crypto-config/peerOrganizations/patient.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('PatientMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('PatientMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('PatientMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('PatientMSP.member')"
    AnchorPeers:
      - Host: peer0.patient.com
        Port: 7051

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true

Application: &ApplicationDefaults
  Organizations: []
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses:
    - orderer.example.com:7050
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  EtcdRaft:
    Consenters:
      - Host: orderer.example.com
        Port: 7050
        ClientTLSCert: crypto-config/ordererOrganizations/example.com/orderers/orderer.example.com/tls/server.crt
        ServerTLSCert: crypto-config/ordererOrganizations/example.com/orderers/orderer.example.com/tls/server.crt
  Organizations:
    - *OrdererOrg
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "MAJORITY BlockValidation"
  Capabilities:
    <<: *OrdererCapabilities

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

Profiles:
  # System channel profile - for orderer genesis (includes both Orderer and Application)
  SystemChannel:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *HospitalMSP
        - *DoctorMSP
        - *PatientMSP

  # Application channel profile - for creating application channel via channel participation
  MedicalChannel:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *HospitalMSP
        - *DoctorMSP
        - *PatientMSP
